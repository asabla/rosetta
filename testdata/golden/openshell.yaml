version: 1
filesystem_policy:
  include_workdir: false
  read_only: []
  read_write:
    - "/workspace/src"
landlock:
  compatibility: "hard_requirement"
process:
  run_as_user: "sandbox"
  run_as_group: "sandbox"
network_policies:
  "openshell-github":
    name: "openshell-github"
    endpoints:
      - host: "api.github.com"
        port: 443
        protocol: "rest"
        enforcement: enforce
        access: "read-only"
    binaries:
      - path: "/usr/bin/gh"

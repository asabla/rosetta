default_permissions = "rosetta"

[permissions.rosetta]
description = "Generated by Rosetta from Cedar-authorized capabilities."

[permissions.rosetta.filesystem]
":minimal" = "read"
":workspace_roots" = { "." = "deny" }
"/workspace/src" = "write"

[mcp_servers.filesystem]
command = "mcp-server-filesystem"
args = ["/workspace/src"]
enabled_tools = ["read_file"]

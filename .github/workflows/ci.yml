name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Test with race detector
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Scan Go dependencies
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Build commands
        run: go build ./cmd/...

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true
      - name: Fuzz Cedar parsing
        run: go test . -run='^$' -fuzz=FuzzCheckNeverPanics -fuzztime=30s
      - name: Fuzz deny preservation
        run: go test . -run='^$' -fuzz=FuzzCompileNeverBroadensDeniedInput -fuzztime=30s

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build service image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rosetta:test

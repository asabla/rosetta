name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.25.12'
          cache: true
      - name: Check toolchain consistency
        run: sh scripts/check-toolchain.sh
      - name: Check workflow action pins
        run: sh scripts/check-workflow-pins.sh
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Test with race detector
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Scan Go dependencies
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Build commands
        run: go build ./cmd/...

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.25.12'
          cache: true
      - name: Fuzz Cedar parsing
        run: go test . -run='^$' -fuzz=FuzzCheckNeverPanics -fuzztime=30s
      - name: Fuzz deny preservation
        run: go test . -run='^$' -fuzz=FuzzCompileNeverBroadensDeniedInput -fuzztime=30s
      - name: Fuzz glob decision isolation
        run: go test . -run='^$' -fuzz=FuzzGlobIntersectionNeverMissesWitness -fuzztime=30s

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build service image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          tags: rosetta:test
          platforms: linux/amd64,linux/arm64

  release-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.25.12'
          cache: true
      - name: Check GoReleaser configuration
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: 'v2.17.0'
          args: check
      - name: Install Syft for release SBOMs
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: 'v1.42.3'
      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: 'v2.17.0'
          args: release --snapshot --clean
